 <a href="ghalib.html" style="text-decoration:none; color:inherit;">

    <a href="iqbal.html" style="text-decoration:none; color:inherit;">

<script>
function showPoetry(poet){

    if(poet === "jaun"){
        alert("🖋️ Jaun Elia: Shayad mujhe kisi se mohabbat nahi hui...");
    }

    else if(poet === "ghalib"){
        alert("❤️ Mirza Ghalib: Hazaron khwahishen aisi ke har khwahish pe dam nikle.");
    }

    else if(poet === "iqbal"){
        alert("📚 Allama Iqbal: Khudi ko kar buland itna...");
    }

    else if(poet === "faraz"){
        alert("🌹 Ahmed Faraz: Suna hai log use aankh bhar ke dekhte hain.");
    }

}
